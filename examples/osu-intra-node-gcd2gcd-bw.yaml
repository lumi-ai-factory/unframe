name: osu-intra-node-gcd2gcd-bw
tags: [gpu, mpi, single-node, bandwidth]
description: |
  Test MPI bandwidth of GPU-allocated memory transfers between two processes
  within a single node. The theoretical hardware-limited bandwidth between
  specific GPU dies varies due to the node's architecture. This test verifies
  that the expected minimum bandwidth is achieved between different combinations
  of logical GPUs (also known as GPU dies or GCDs).

params:
  rank0_gcd: [0, 1]
  rank1_gcd: [0, 1, 2, 3, 4, 5, 6, 7]
  transfer_size: [1048576, 67108864]

job: |
  #!/bin/bash
  #SBATCH --gpus-per-node=8
  #SBATCH --ntasks-per-node=2
  #SBATCH --nodes=1
  #SBATCH --partition=dev-g
  #SBATCH --account={{ params.account }}
  #SBATCH --time=15

  module purge
  module load Local-LAIF lumi-aif-singularity-bindings

  for rank0_gcd in {{ params.rank0_gcd }}; do
    for rank1_gcd in {{ params.rank1_gcd }}; do
      for transfer_size in {{ params.transfer_size }}; do
        echo "rank0_gcd=${rank0_gcd},rank1_gcd=${rank1_gcd},transfer_size=${transfer_size}"
        srun -Q singularity run "{{ params.container }}" bash -c "{{ command }}"
        echo
      done
    done
  done

command: |
  if [[ \$PMI_RANK -eq 0 ]]; then
    export ROCR_VISIBLE_DEVICES=${rank0_gcd};
  elif [[ \$PMI_RANK -eq 1 ]]; then
    export ROCR_VISIBLE_DEVICES=${rank1_gcd};
  else
    echo \"unexpected rank \$PMI_RANK\" >&2; exit 1;
  fi
  /usr/libexec/osu-micro-benchmarks/mpi/pt2pt/osu_bw -m ${transfer_size}:${transfer_size} D D

# Result parsing function parses stdout from the command and retuns anything
# the corresponding validate function can parse: parse(text, params) -> any type
parse: |
  def parse(text: str, params: dict) -> list:
      import re
      from itertools import product

      PARAM_TEMPLATE = "rank0_gcd={rank0_gcd},rank1_gcd={rank1_gcd},transfer_size={transfer_size}"
      BW_TEMPLATE = r"{transfer_size}\s+([0-9]+\.[0-9]+)"

      results = [
          {"rank0_gcd": r0, "rank1_gcd": r1, "transfer_size": ts}
          for (r0, r1, ts) in product(*params.values())
      ]

      lines = text.splitlines()
      for i in range(len(results)):
          rank0_gcd, rank1_gcd, transfer_size = results[i].values()
          param_pattern = param_template.format(
              rank0_gcd=rank0_gcd, rank1_gcd=rank1_gcd, transfer_size=transfer_size,
          )
          bw_pattern = BW_TEMPLATE.format(transfer_size=transfer_size)

          for j in range(len(lines)):
              if lines[j] == param_pattern:
                  for k in range(j+1, len(lines)):
                      m = re.fullmatch(bw_pattern, lines[k])
                      if m:
                          results[i]["bandwidth_MBps"] = float(m.group(1))
                          break
                  break

      return results

# Validate function validates anything the corresponding parse function produces.
# validate(results, params) -> bool OR (bool, list)
validate: |
  def validate(results: list, params: dict):
      EXPECTED_MINIMUMS = {
          (0,0,67108864): 450000,
          (0,1,67108864): 50000,
          (0,2,67108864): 37000,
          (0,3,67108864): 37000,
          (0,4,67108864): 37000,
          (0,5,67108864): 37000,
          (0,6,67108864): 45000,
          (0,7,67108864): 37000,

          (1,0,67108864): 50000,
          (1,1,67108864): 450000,
          (1,2,67108864): 37000,
          (1,3,67108864): 37000,
          (1,4,67108864): 37000,
          (1,5,67108864): 37000,
          (1,6,67108864): 45000,
          (1,7,67108864): 30000,

          (0,0,1048576): 45000,
          (0,1,1048576): 36000,
          (0,2,1048576): 25000,
          (0,3,1048576): 25000,
          (0,4,1048576): 25000,
          (0,5,1048576): 25000,
          (0,6,1048576): 25000,
          (0,7,1048576): 25000,

          (1,0,1048576): 36000,
          (1,1,1048576): 50000,
          (1,2,1048576): 25000,
          (1,3,1048576): 25000,
          (1,4,1048576): 25000,
          (1,5,1048576): 25000,
          (1,6,1048576): 25000,
          (1,7,1048576): 25000,
      }

      all_ok = True

      for r in results:
          key = tuple(v for k, v in r.items() if k != "bandwidth_MBps")
          threshold = EXPECTED_MINIMUMS.get(key)

          bw = r.get("bandwidth_MBps")

          if bw is None:
              r.update({"status": 1, "message": "no bandwidth parsed"})
              all_ok = False
          else:
              ok = bw >= threshold
              msg = "min={} MB/s, got {:.1f} MB/s".format(threshold, bw)
              r.update({"status": 0 if ok else 1, "message": msg})
              all_ok = ok

      return (all_ok, results)
